<!DOCTYPE html>
<html>

<head>
    <title>CNC Production DB</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2>Database CNC</h2>
    </header>

    <div class="container">

        <div class="form-box">
            <input type="date" id="tanggal">
            <input type="text" id="namaPart" placeholder="Nama Part">
            <input type="number" id="jumlah" placeholder="Jumlah">
            <button onclick="addOrder()">Simpan</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Tanggal</th>
                    <th class="sortable" data-key="nama_part">Nama Part ⬍</th>
                    <th class="sortable" data-key="jumlah">Jumlah ⬍</th>
                    <th id="status">Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="orderTable"></tbody>
        </table>

    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Data Produksi</h3>
            <input type="hidden" id="editId">
            <label>Nama Part:</label>
            <input type="text" id="editNamaPart">
            <label>Jumlah:</label>
            <input type="number" id="editJumlah">
            <div class="modal-buttons">
                <button onclick="saveEdit()" class="btn-save">Simpan Perubahan</button>
                <button onclick="closeModal()" class="btn-cancel">Batal</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
