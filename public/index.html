<!DOCTYPE html>
<html>

<head>
    <title>CNC Production DB</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h2>Database CNC</h2>
    </header>

    <div class="container">

        <div class="form-box">
            <input type="date" id="tanggal">
            <input type="text" id="namaPart" placeholder="Nama Part">
            <input type="number" id="jumlah" placeholder="Jumlah">
            <button onclick="addOrder()">Simpan</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Tanggal</th>
                    <th class="sortable" data-key="nama_part">Nama Part ⬍</th>
                    <th class="sortable" data-key="jumlah">Jumlah ⬍</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="orderTable"></tbody>
        </table>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
